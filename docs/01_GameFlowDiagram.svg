<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <!-- Background -->
  <rect width="1200" height="900" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="600" y="50" text-anchor="middle" fill="#e74c3c" font-family="Arial Black" font-size="36" font-weight="bold">STEALTH ASSASSIN</text>
  <text x="600" y="85" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="20" font-style="italic">Game Flow Diagram</text>
  <line x1="300" y1="100" x2="900" y2="100" stroke="#e74c3c" stroke-width="2"/>

  <!-- Defs for arrows -->
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#f39c12"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#e74c3c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <polygon points="0 0, 12 6, 0 12" fill="#27ae60"/>
    </marker>
  </defs>

  <!-- ===== START NODE ===== -->
  <g>
    <ellipse cx="600" cy="160" rx="80" ry="35" fill="#16a085" stroke="#1abc9c" stroke-width="3"/>
    <text x="600" y="167" text-anchor="middle" fill="white" font-family="Arial" font-size="18" font-weight="bold">START</text>
  </g>

  <!-- Arrow from START to MainMenu -->
  <line x1="600" y1="195" x2="600" y2="240" stroke="#f39c12" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== MAIN MENU SCREEN ===== -->
  <g>
    <rect x="450" y="245" width="300" height="100" rx="10" fill="#2c3e50" stroke="#3498db" stroke-width="3"/>
    <text x="600" y="280" text-anchor="middle" fill="#3498db" font-family="Arial Black" font-size="22" font-weight="bold">MAIN MENU</text>
    <text x="600" y="305" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="13">MainMenuScreen.java</text>
    <text x="600" y="325" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="12">[START GAME] [EXIT]</text>
  </g>

  <!-- Arrow MainMenu → HeroSelection -->
  <line x1="600" y1="345" x2="600" y2="390" stroke="#f39c12" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="615" y="372" fill="#f39c12" font-family="Arial" font-size="13" font-style="italic">[ENTER]</text>

  <!-- ===== HERO SELECTION SCREEN ===== -->
  <g>
    <rect x="425" y="395" width="350" height="120" rx="10" fill="#2c3e50" stroke="#9b59b6" stroke-width="3"/>
    <text x="600" y="430" text-anchor="middle" fill="#9b59b6" font-family="Arial Black" font-size="22" font-weight="bold">HERO SELECTION</text>
    <text x="600" y="455" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="13">HeroSelectionScreen.java</text>
    <text x="600" y="478" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="12">Choose: Ninja / Shadow / Rogue</text>
    <text x="600" y="498" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="12">Difficulty: Easy / Hard</text>
  </g>

  <!-- Arrow HeroSelection → GameScreen -->
  <line x1="600" y1="515" x2="600" y2="560" stroke="#f39c12" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="615" y="542" fill="#f39c12" font-family="Arial" font-size="13" font-style="italic">[ENTER]</text>

  <!-- Arrow HeroSelection → MainMenu (back) -->
  <path d="M 425 455 Q 250 455 250 295 Q 250 245 450 280" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <text x="180" y="350" fill="#95a5a6" font-family="Arial" font-size="12" font-style="italic">[ESC] back</text>

  <!-- ===== GAME SCREEN ===== -->
  <g>
    <rect x="375" y="565" width="450" height="160" rx="10" fill="#2c3e50" stroke="#e74c3c" stroke-width="3"/>
    <text x="600" y="600" text-anchor="middle" fill="#e74c3c" font-family="Arial Black" font-size="24" font-weight="bold">GAME SCREEN</text>
    <text x="600" y="623" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="13">GameScreen.java</text>

    <!-- Internal loop -->
    <text x="600" y="650" text-anchor="middle" fill="#ecf0f1" font-family="Arial" font-size="13" font-weight="bold">Game Loop:</text>
    <text x="600" y="670" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">• Input → Movement → Detection</text>
    <text x="600" y="687" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">• Enemy AI (State Pattern) → Combat</text>
    <text x="600" y="704" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">• Render → UI → HP / Score Update</text>
  </g>

  <!-- Self-loop for game -->
  <path d="M 825 645 Q 880 645 880 595 Q 880 565 825 580" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="900" y="610" fill="#3498db" font-family="Arial" font-size="11" font-style="italic">while alive</text>

  <!-- Arrow GameScreen → MainMenu (ESC) -->
  <path d="M 375 595 Q 150 595 150 295 Q 150 245 450 270" stroke="#95a5a6" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrow)"/>
  <text x="80" y="430" fill="#95a5a6" font-family="Arial" font-size="12" font-style="italic">[ESC]</text>

  <!-- Arrows from GameScreen to GameOver - 2 paths -->

  <!-- Victory path (left) -->
  <line x1="450" y1="725" x2="350" y2="780" stroke="#27ae60" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="320" y="760" fill="#27ae60" font-family="Arial" font-size="13" font-weight="bold">All enemies dead</text>

  <!-- Defeat path (right) -->
  <line x1="750" y1="725" x2="850" y2="780" stroke="#e74c3c" stroke-width="3" marker-end="url(#arrowRed)"/>
  <text x="850" y="760" fill="#e74c3c" font-family="Arial" font-size="13" font-weight="bold">HP = 0</text>

  <!-- ===== VICTORY SCREEN ===== -->
  <g>
    <rect x="180" y="785" width="280" height="80" rx="10" fill="#1e3a1e" stroke="#27ae60" stroke-width="3"/>
    <text x="320" y="815" text-anchor="middle" fill="#27ae60" font-family="Arial Black" font-size="20" font-weight="bold">VICTORY!</text>
    <text x="320" y="838" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="12">GameOverScreen (victory=true)</text>
    <text x="320" y="855" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Show final score</text>
  </g>

  <!-- ===== DEFEAT SCREEN ===== -->
  <g>
    <rect x="740" y="785" width="280" height="80" rx="10" fill="#3a1e1e" stroke="#e74c3c" stroke-width="3"/>
    <text x="880" y="815" text-anchor="middle" fill="#e74c3c" font-family="Arial Black" font-size="20" font-weight="bold">DEFEAT</text>
    <text x="880" y="838" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="12">GameOverScreen (victory=false)</text>
    <text x="880" y="855" text-anchor="middle" fill="#95a5a6" font-family="Arial" font-size="11">Show final score</text>
  </g>

  <!-- Both end screens → MainMenu (return loop) -->
  <path d="M 320 785 Q 320 730 80 730 Q 50 730 50 295 Q 50 200 450 270" stroke="#27ae60" stroke-width="2" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowGreen)"/>
  <path d="M 880 785 Q 880 730 1130 730 Q 1150 730 1150 295 Q 1150 200 750 270" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,3" fill="none" marker-end="url(#arrowRed)"/>

  <text x="50" y="500" fill="#27ae60" font-family="Arial" font-size="12" font-style="italic" transform="rotate(-90 50 500)">[ENTER] retry</text>
  <text x="1170" y="500" fill="#e74c3c" font-family="Arial" font-size="12" font-style="italic" transform="rotate(90 1170 500)">[ENTER] retry</text>

  <!-- ===== LEGEND ===== -->
  <g>
    <rect x="40" y="120" width="200" height="120" rx="6" fill="#2c3e50" stroke="#7f8c8d" stroke-width="1" opacity="0.9"/>
    <text x="50" y="142" fill="#ecf0f1" font-family="Arial" font-size="13" font-weight="bold">LEGEND:</text>

    <line x1="55" y1="160" x2="80" y2="160" stroke="#f39c12" stroke-width="3"/>
    <text x="85" y="164" fill="#bdc3c7" font-family="Arial" font-size="11">Forward navigation</text>

    <line x1="55" y1="180" x2="80" y2="180" stroke="#95a5a6" stroke-width="2" stroke-dasharray="3,3"/>
    <text x="85" y="184" fill="#bdc3c7" font-family="Arial" font-size="11">Back / ESC</text>

    <line x1="55" y1="200" x2="80" y2="200" stroke="#27ae60" stroke-width="3"/>
    <text x="85" y="204" fill="#bdc3c7" font-family="Arial" font-size="11">Victory path</text>

    <line x1="55" y1="220" x2="80" y2="220" stroke="#e74c3c" stroke-width="3"/>
    <text x="85" y="224" fill="#bdc3c7" font-family="Arial" font-size="11">Defeat path</text>
  </g>

  <!-- Footer -->
  <text x="600" y="885" text-anchor="middle" fill="#7f8c8d" font-family="Arial" font-size="11" font-style="italic">SDP Project • 2026 • Onalbaev Aidos, Seisembay Asylbek, Aruzhan Kuat</text>
</svg>
